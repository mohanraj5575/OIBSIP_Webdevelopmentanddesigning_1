<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fashion Store</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #fdfdfd;
      color: #333;
    }

    /* Navigation bar */
    nav {
      background-color: #222;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
    }
    nav ul li {
      margin-right: 20px;
    }
    nav ul li a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }
    nav ul li a:hover {
      color: #ff4081;
    }
    .search-bar input {
      padding: 6px 10px;
      border: none;
      border-radius: 4px;
      margin-right: 8px;
    }
    .search-bar button {
      background-color: #ff4081;
      color: white;
      border: none;
      padding: 6px 12px;
      cursor: pointer;
      border-radius: 4px;
    }
    .search-bar button:hover {
      background-color: #e91e63;
    }

    /* Hero section */
    .hero {
      text-align: center;
      padding: 60px 20px;
      background-color: #ffe4e1;
    }
    .hero h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }
    .hero p {
      font-size: 1.2em;
      margin-bottom: 20px;
    }
    .hero button {
      background-color: #ff4081;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 1em;
      cursor: pointer;
      border-radius: 4px;
    }
    .hero button:hover {
      background-color: #e91e63;
    }

    /* Products section */
    .products {
      padding: 40px 20px;
      text-align: center;
    }
    .products h2 {
      margin-bottom: 30px;
    }
    .product-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }
    .product {
      border: 1px solid #ddd;
      padding: 15px;
      width: 220px;
      background-color: #fafafa;
      border-radius: 6px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .product img {
      width: 100%;
      height: auto;
      border-radius: 4px;
      margin-bottom: 10px;
    }
    .product h3 {
      margin-bottom: 10px;
    }
    .product p {
      font-weight: bold;
      margin-bottom: 10px;
    }
    .product button {
      background-color: #4caf50;
      color: white;
      border: none;
      padding: 8px 15px;
      cursor: pointer;
      border-radius: 4px;
    }
    .product button:hover {
      background-color: #388e3c;
    }
    .product:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <nav>
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">Shop</a></li>
      <li><a href="#">New Arrivals</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search products...">
      <button onclick="searchProducts()">Search</button>
    </div>
  </nav>

  <section class="hero">
    <h1>Trendy Dresses</h1>
    <p>Discover the latest fashion styles for every occasion</p>
    <button>Shop Now</button>
  </section>

  <section class="products">
    <h2>Popular Dresses</h2>
    <div class="product-list">
      <div class="product">
        <img src="C:\Users\mohan\Desktop\JUST_INTERN\sample_image_1cas.jpg" alt="Casual Dress">
        <h3>Casual Dress</h3>
        <p>₹999</p>
        <button>Add to Cart</button>
      </div>
      <div class="product">
        <img src="C:\Users\mohan\Desktop\JUST_INTERN\samp_party.jpg" alt="Party Wear">
        <h3>Party Wear</h3>
        <p>₹1499</p>
        <button>Add to Cart</button>
      </div>
      <div class="product">
        <img src="C:\Users\mohan\Desktop\JUST_INTERN\images.jpg" alt="Summer Dress">
        <h3>Summer Dress</h3>
        <p>₹799</p>
        <button>Add to Cart</button>
      </div>
    </div>
  </section>

  <script>
    function searchProducts() {
      const input = document.getElementById("searchInput").value.toLowerCase();
      const products = document.querySelectorAll(".product");

      products.forEach(product => {
        const name = product.querySelector("h3").textContent.toLowerCase();
        if (name.includes(input)) {
          product.style.display = "block";
        } else {
          product.style.display = "none";
        }
      });
    }
  </script>
</body>
</html>
